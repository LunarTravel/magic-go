# magic-service 服务配置
# 所有变量从 .env / 环境变量读取，格式 ${VAR:-默认值}
server:
  port: ${SERVER_PORT:-9501}
  mode: ${SERVER_MODE:-debug}        # debug | release | test
  base_path: "${SERVER_BASE_PATH:-}"
  env: ${APP_ENV:-local}             # local | dev | staging | production
  pprof_enabled: ${SERVER_PPROF_ENABLED:-true}

logging:
  level: ${LOG_LEVEL:-info}          # debug | info | warn | error
  format: ${LOG_FORMAT:-json}        # json | text

mysql:
  host: "${MYSQL_HOST:-127.0.0.1}"
  port: ${MYSQL_PORT:-3306}
  database: "${MYSQL_DATABASE:-magic}"
  username: "${MYSQL_USERNAME:-root}"
  password: "${MYSQL_PASSWORD:-}"
  charset: utf8mb4
  max_open_conns: 100
  max_idle_conns: 20
  conn_max_lifetime_seconds: 3600

redis:
  host: "${REDIS_HOST:-127.0.0.1}"
  port: ${REDIS_PORT:-6379}
  password: "${REDIS_PASSWORD:-}"
  db: ${REDIS_DB:-0}
